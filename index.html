<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<meta name="theme-color" content="#079897"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<title>InternPulse</title>
<link rel="manifest" href="data:application/json,{&quot;name&quot;:&quot;InternLink YSH&quot;,&quot;short_name&quot;:&quot;InternLink&quot;,&quot;start_url&quot;:&quot;.&quot;,&quot;display&quot;:&quot;standalone&quot;,&quot;background_color&quot;:&quot;%23f7f9f9&quot;,&quot;theme_color&quot;:&quot;%23079897&quot;}"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root {
  --teal: #079897;
  --teal-dark: #056b6a;
  --teal-light: #e0f5f5;
  --teal-pale: #f0fafa;
  --green: #22c55e;
  --green-light: #dcfce7;
  --amber: #f59e0b;
  --amber-light: #fef3c7;
  --red: #ef4444;
  --red-light: #fee2e2;
  --ink: #0f2b2b;
  --ink2: #2d4a4a;
  --muted: #7a9e9e;
  --border: #d0e8e8;
  --bg: #f4fafa;
  --white: #ffffff;
  --card: #ffffff;
  --shadow: 0 2px 16px rgba(7,152,151,0.10);
  --shadow-lg: 0 8px 40px rgba(7,152,151,0.16);
  --radius: 16px;
  --radius-sm: 10px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--ink);min-height:100vh;overflow-x:hidden;}
h1,h2,h3,.serif{font-family:'DM Serif Display',serif;}

/* LAYOUT */
#app{display:flex;flex-direction:column;min-height:100vh;}
.topbar{background:var(--teal);color:#fff;padding:14px 20px 12px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(7,152,151,0.3);}
.topbar-title{font-family:'DM Serif Display',serif;font-size:1.25rem;letter-spacing:0.02em;}
.topbar-sub{font-size:0.7rem;opacity:0.75;margin-top:1px;}
.topbar-actions{display:flex;gap:8px;}
.icon-btn{background:rgba(255,255,255,0.15);border:none;color:#fff;width:36px;height:36px;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:1rem;transition:background 0.2s;}
.icon-btn:hover{background:rgba(255,255,255,0.25);}

/* BOTTOM NAV */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:var(--white);border-top:1px solid var(--border);display:flex;z-index:100;box-shadow:0 -4px 20px rgba(7,152,151,0.10);}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;padding:10px 4px 8px;cursor:pointer;border:none;background:none;color:var(--muted);font-family:'DM Sans',sans-serif;font-size:0.65rem;gap:4px;transition:color 0.2s;}
.nav-item.active{color:var(--teal);}
.nav-item svg{width:22px;height:22px;}
.nav-dot{width:5px;height:5px;border-radius:50%;background:var(--teal);margin-top:2px;opacity:0;}
.nav-item.active .nav-dot{opacity:1;}

/* SCREENS */
.screen{display:none;padding:16px 16px 90px;animation:fadeUp 0.25s ease;}
.screen.active{display:block;}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}

/* CARDS */
.card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);padding:18px;margin-bottom:14px;border:1px solid var(--border);}
.card-sm{padding:14px;}

/* STAT STRIP */
.stat-strip{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:18px;}
.stat-card{background:var(--white);border-radius:var(--radius-sm);padding:14px 10px;text-align:center;border:1px solid var(--border);box-shadow:var(--shadow);}
.stat-num{font-family:'DM Serif Display',serif;font-size:1.8rem;color:var(--teal);line-height:1;}
.stat-label{font-size:0.65rem;color:var(--muted);margin-top:4px;text-transform:uppercase;letter-spacing:0.05em;}

/* INTERN CARD with checklist split */
.intern-card{background:var(--card);border-radius:var(--radius);border:1px solid var(--border);box-shadow:var(--shadow);margin-bottom:14px;overflow:hidden;display:flex;}
.intern-card-left{flex:1;padding:16px;}
.intern-card-right{width:140px;border-left:1px solid var(--border);background:var(--teal-pale);padding:12px 10px;display:flex;flex-direction:column;gap:6px;flex-shrink:0;}
.intern-name{font-family:'DM Serif Display',serif;font-size:1.05rem;color:var(--ink);margin-bottom:2px;}
.intern-meta{font-size:0.72rem;color:var(--muted);margin-bottom:8px;}
.intern-badge{display:inline-block;background:var(--teal-light);color:var(--teal-dark);font-size:0.65rem;padding:3px 8px;border-radius:20px;font-weight:600;}
.intern-mentor{font-size:0.75rem;color:var(--ink2);margin-top:6px;}

/* CHECKLIST */
.check-item{display:flex;align-items:center;gap:6px;font-size:0.68rem;color:var(--ink2);}
.check-icon{width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:0.7rem;}
.check-icon.done{background:var(--green);color:#fff;}
.check-icon.pending{background:#e5e7eb;color:#9ca3af;}
.check-label{line-height:1.2;}

/* PROGRESS BAR */
.progress-bar{height:4px;background:#e5e7eb;border-radius:2px;margin-top:8px;overflow:hidden;}
.progress-fill{height:100%;border-radius:2px;background:linear-gradient(90deg,var(--teal),var(--green));transition:width 0.5s ease;}

/* FORMS */
.form-group{margin-bottom:14px;}
.form-label{font-size:0.75rem;font-weight:600;color:var(--ink2);margin-bottom:6px;display:block;text-transform:uppercase;letter-spacing:0.04em;}
.form-input,.form-select,.form-textarea{width:100%;padding:11px 14px;border:1.5px solid var(--border);border-radius:var(--radius-sm);font-family:'DM Sans',sans-serif;font-size:0.875rem;color:var(--ink);background:var(--white);transition:border-color 0.2s,box-shadow 0.2s;outline:none;}
.form-input:focus,.form-select:focus,.form-textarea:focus{border-color:var(--teal);box-shadow:0 0 0 3px rgba(7,152,151,0.12);}
.form-textarea{min-height:90px;resize:vertical;}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.form-section{font-family:'DM Serif Display',serif;font-size:1rem;color:var(--teal);margin:18px 0 12px;padding-bottom:6px;border-bottom:1px solid var(--teal-light);}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:12px 22px;border-radius:var(--radius-sm);font-family:'DM Sans',sans-serif;font-weight:600;font-size:0.875rem;cursor:pointer;border:none;transition:all 0.2s;width:100%;}
.btn-primary{background:var(--teal);color:#fff;}
.btn-primary:hover{background:var(--teal-dark);box-shadow:var(--shadow);}
.btn-secondary{background:var(--teal-light);color:var(--teal-dark);}
.btn-ghost{background:transparent;color:var(--muted);border:1.5px solid var(--border);}
.btn-danger{background:var(--red-light);color:var(--red);}
.btn-sm{padding:8px 14px;font-size:0.78rem;width:auto;}

/* SEARCH */
.search-bar{position:relative;margin-bottom:16px;}
.search-bar input{width:100%;padding:11px 14px 11px 40px;border:1.5px solid var(--border);border-radius:30px;font-family:'DM Sans',sans-serif;font-size:0.875rem;background:var(--white);outline:none;color:var(--ink);}
.search-bar input:focus{border-color:var(--teal);box-shadow:0 0 0 3px rgba(7,152,151,0.1);}
.search-icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:1rem;}

/* SECTION HEADER */
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.section-title{font-family:'DM Serif Display',serif;font-size:1.15rem;}

/* EMPTY STATE */
.empty{text-align:center;padding:48px 20px;color:var(--muted);}
.empty-icon{font-size:3rem;margin-bottom:12px;opacity:0.5;}
.empty-text{font-size:0.875rem;}

/* TOAST */
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--ink);color:#fff;padding:10px 20px;border-radius:30px;font-size:0.8rem;z-index:999;opacity:0;transition:all 0.3s;pointer-events:none;white-space:nowrap;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.toast.success{background:var(--teal);}
.toast.error{background:var(--red);}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(15,43,43,0.5);z-index:200;display:none;align-items:flex-end;}
.modal-overlay.show{display:flex;}
.modal{background:var(--white);border-radius:24px 24px 0 0;width:100%;max-height:90vh;overflow-y:auto;padding:20px 20px 40px;}
.modal-handle{width:40px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 16px;}
.modal-title{font-family:'DM Serif Display',serif;font-size:1.2rem;margin-bottom:16px;}

/* CHIP FILTER */
.chip-row{display:flex;gap:8px;overflow-x:auto;padding-bottom:4px;margin-bottom:14px;scrollbar-width:none;}
.chip-row::-webkit-scrollbar{display:none;}
.chip{padding:6px 14px;border-radius:20px;font-size:0.72rem;font-weight:600;cursor:pointer;border:1.5px solid var(--border);background:var(--white);color:var(--muted);white-space:nowrap;transition:all 0.2s;}
.chip.active{background:var(--teal);color:#fff;border-color:var(--teal);}

/* DETAIL VIEW */
.detail-header{background:linear-gradient(135deg,var(--teal),var(--teal-dark));color:#fff;border-radius:var(--radius);padding:20px;margin-bottom:14px;}
.detail-name{font-family:'DM Serif Display',serif;font-size:1.4rem;margin-bottom:4px;}
.detail-sub{font-size:0.8rem;opacity:0.85;}
.detail-checklist{background:var(--card);border-radius:var(--radius);border:1px solid var(--border);overflow:hidden;margin-bottom:14px;}
.check-row{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-bottom:1px solid var(--border);}
.check-row:last-child{border-bottom:none;}
.check-row-left{display:flex;align-items:center;gap:10px;}
.check-row-label{font-size:0.85rem;font-weight:500;}
.check-row-sub{font-size:0.7rem;color:var(--muted);margin-top:1px;}
.big-check{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1rem;flex-shrink:0;}
.big-check.done{background:var(--green);color:#fff;}
.big-check.pending{background:#f3f4f6;color:#d1d5db;border:2px solid #e5e7eb;}
.toggle-btn{padding:5px 12px;border-radius:20px;font-size:0.7rem;font-weight:600;cursor:pointer;border:none;}
.toggle-btn.mark{background:var(--green-light);color:#16a34a;}
.toggle-btn.unmark{background:var(--red-light);color:var(--red);}

/* MENTOR CARD */
.mentor-avatar{width:48px;height:48px;border-radius:50%;background:var(--teal);color:#fff;display:flex;align-items:center;justify-content:center;font-family:'DM Serif Display',serif;font-size:1.2rem;flex-shrink:0;}

/* LOADING */
.loading{display:flex;align-items:center;justify-content:center;padding:40px;color:var(--muted);}
.spinner{width:24px;height:24px;border:2.5px solid var(--border);border-top-color:var(--teal);border-radius:50%;animation:spin 0.7s linear infinite;margin-right:10px;}
@keyframes spin{to{transform:rotate(360deg);}}

/* FAB */
.fab{position:fixed;bottom:80px;right:20px;width:52px;height:52px;border-radius:50%;background:var(--teal);color:#fff;border:none;cursor:pointer;font-size:1.5rem;box-shadow:var(--shadow-lg);display:flex;align-items:center;justify-content:center;transition:all 0.2s;z-index:90;}
.fab:hover{background:var(--teal-dark);transform:scale(1.08);}
.fab:active{transform:scale(0.95);}

@media(min-width:600px){
  .stat-strip{grid-template-columns:repeat(3,1fr);}
  .intern-card-right{width:160px;}
}
</style>
</head>
<body>
<div id="app">

<!-- TOP BAR -->
<div class="topbar">
  <div>
    <div class="topbar-title">InternLink</div>
    <div class="topbar-sub">Yenepoya Specialty Hospital</div>
  </div>
  <div class="topbar-actions">
    <button class="icon-btn" onclick="refreshAll()" title="Refresh">↻</button>
  </div>
</div>

<!-- SCREENS -->
<div id="screen-home" class="screen active">
  <div class="stat-strip" id="stat-strip">
    <div class="stat-card"><div class="stat-num" id="s-interns">—</div><div class="stat-label">Interns</div></div>
    <div class="stat-card"><div class="stat-num" id="s-mentors">—</div><div class="stat-label">Mentors</div></div>
    <div class="stat-card"><div class="stat-num" id="s-complete">—</div><div class="stat-label">Complete</div></div>
  </div>
  <div class="section-header">
    <div class="section-title">Active Interns</div>
  </div>
  <div class="search-bar">
    <span class="search-icon">🔍</span>
    <input type="text" placeholder="Search by name, mentor, location…" id="home-search" oninput="filterHomeList()"/>
  </div>
  <div class="chip-row" id="location-chips"></div>
  <div id="intern-list-home"></div>
</div>

<div id="screen-add" class="screen">
  <div class="section-title" style="margin-bottom:18px;">New Intern</div>

  <div class="form-section">Academic Details</div>
  <div class="form-group"><label class="form-label">Full Name *</label><input class="form-input" id="f-name" placeholder="Dr. / Mr. / Ms. Full Name"/></div>
  <div class="form-group"><label class="form-label">College / Institution *</label><input class="form-input" id="f-college" placeholder="Institution name"/></div>
  <div class="form-row">
    <div class="form-group"><label class="form-label">Department</label><input class="form-input" id="f-dept" placeholder="e.g. Quality, Emergency"/></div>
    <div class="form-group"><label class="form-label">Academic Year</label><input class="form-input" id="f-year" placeholder="e.g. 3rd Year BHA"/></div>
  </div>

  <div class="form-section">Posting Details</div>
  <div class="form-group"><label class="form-label">Posting Location</label><input class="form-input" id="p-loc" placeholder="e.g. Emergency"/></div>
    <div class="form-row">
    <div class="form-group"><label class="form-label">Start Date</label><input class="form-input" type="date" id="f-start"/></div>
    <div class="form-group"><label class="form-label">End Date</label><input class="form-input" type="date" id="f-end"/></div>
  </div>

  <div class="form-section">Mentor Details</div>
  <div class="form-row">
    <div class="form-group"><label class="form-label">Mentor Name *</label><input class="form-input" id="f-mentor" placeholder="Full name"/></div>
    <div class="form-group"><label class="form-label">Designation</label><input class="form-input" id="f-mdesig" placeholder="e.g. Consultant"/></div>
  </div>

  <div class="form-section">Objective</div>
  <div class="form-group">
    <textarea class="form-textarea" id="f-objective" placeholder="What will the intern learn? What value do they bring? Expected outcomes…"></textarea>
  </div>

  <button class="btn btn-primary" onclick="submitIntern()">✦ Register Intern</button>
  <div style="height:12px;"></div>
</div>

<div id="screen-mentors" class="screen">
  <div class="section-header">
    <div class="section-title">Mentor Profiles</div>
    <button class="btn btn-secondary btn-sm" onclick="openAddMentorModal()">+ Add</button>
  </div>
  <div id="mentor-list"></div>
</div>

<div id="screen-detail" class="screen">
  <div id="detail-content"></div>
</div>

<!-- BOTTOM NAV -->
<nav class="bottom-nav">
  <button class="nav-item active" onclick="showScreen('home')" id="nav-home">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
    Dashboard<div class="nav-dot"></div>
  </button>
  <button class="nav-item" onclick="showScreen('add')" id="nav-add">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
    Add Intern<div class="nav-dot"></div>
  </button>
  <button class="nav-item" onclick="showScreen('mentors')" id="nav-mentors">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75"/></svg>
    Mentors<div class="nav-dot"></div>
  </button>
</nav>
</div>

<!-- ADD MENTOR MODAL -->
<div class="modal-overlay" id="mentor-modal">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">Add Mentor</div>
    <div class="form-group"><label class="form-label">Full Name *</label><input class="form-input" id="m-name" placeholder="Full name"/></div>
    <div class="form-group"><label class="form-label">Designation</label><input class="form-input" id="m-desig" placeholder="e.g. Senior Consultant"/></div>
    <div class="form-group"><label class="form-label">Department</label><input class="form-input" id="m-dept" placeholder="e.g. ENT"/></div>
    <div class="form-row">
      <div class="form-group"><label class="form-label">Email</label><input class="form-input" id="m-email" type="email" placeholder="email@yenepoya.org"/></div>
      <div class="form-group"><label class="form-label">Phone</label><input class="form-input" id="m-phone" type="tel" placeholder="10-digit"/></div>
    </div>
    <div style="display:flex;gap:10px;">
      <button class="btn btn-ghost" onclick="closeMentorModal()">Cancel</button>
      <button class="btn btn-primary" onclick="submitMentor()">Save Mentor</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
// ── SUPABASE ──────────────────────────────────────────────
const SUPA_URL = 'https://qkyunliqrsgtrhuoynnn.supabase.co';
const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFreXVubGlxcnNndHJodW95bm5uIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM5MTExNjUsImV4cCI6MjA4OTQ4NzE2NX0.w3XphRDVgud5xwH6xgKNiSdT3jx2YnnMYnKafQ-J244';
const db = supabase.createClient(SUPA_URL, SUPA_KEY);

// ── STATE ─────────────────────────────────────────────────
let allInterns = [];
let allMentors = [];
let checklist = {}; // { intern_id: { profile, mentor, attendance, report, certificate } }
let activeChip = 'All';

// ── INIT ──────────────────────────────────────────────────
window.onload = async () => {
  await refreshAll();
};

async function refreshAll() {
  await Promise.all([loadInterns(), loadMentors(), loadChecklist()]);
  updateStats();
  renderHomeList();
  renderMentors();
}

// ── DATA ──────────────────────────────────────────────────
async function loadInterns() {
  const { data, error } = await db.from('interns').select('*').order('created_at', { ascending: false });
  if (!error) allInterns = data || [];
}

async function loadMentors() {
  const { data, error } = await db.from('mentors').select('*').order('name');
  if (!error) allMentors = data || [];
}

async function loadChecklist() {
  // Load attendance, reports, certificates for all interns
  const [att, rep, cert] = await Promise.all([
    db.from('attendance').select('intern_id'),
    db.from('reports').select('intern_id'),
    db.from('certificates').select('intern_id')
  ]);
  checklist = {};
  allInterns.forEach(i => {
    const id = i.id;
    const hasProfile = !!(i.full_name && i.college && i.posting_location);
    const hasMentor = !!(i.mentor_name);
    const hasAttendance = (att.data || []).some(a => a.intern_id === id);
    const hasReport = (rep.data || []).some(r => r.intern_id === id);
    const hasCert = (cert.data || []).some(c => c.intern_id === id);
    checklist[id] = { profile: hasProfile, mentor: hasMentor, attendance: hasAttendance, report: hasReport, certificate: hasCert };
  });
}

function internProgress(id) {
  const c = checklist[id] || {};
  return Object.values(c).filter(Boolean).length;
}

// ── STATS ─────────────────────────────────────────────────
function updateStats() {
  document.getElementById('s-interns').textContent = allInterns.length;
  document.getElementById('s-mentors').textContent = allMentors.length;
  const complete = allInterns.filter(i => internProgress(i.id) === 5).length;
  document.getElementById('s-complete').textContent = complete;
}

// ── HOME LIST ─────────────────────────────────────────────
function renderHomeList() {
  // Location chips
  const locations = ['All', ...new Set(allInterns.map(i => i.posting_location).filter(Boolean))];
  const chipRow = document.getElementById('location-chips');
  chipRow.innerHTML = locations.map(l =>
    `<div class="chip ${l === activeChip ? 'active' : ''}" onclick="setChip('${l}')">${l}</div>`
  ).join('');
  filterHomeList();
}

function setChip(loc) {
  activeChip = loc;
  renderHomeList();
}

function filterHomeList() {
  const q = (document.getElementById('home-search').value || '').toLowerCase();
  let list = allInterns;
  if (activeChip !== 'All') list = list.filter(i => i.posting_location === activeChip);
  if (q) list = list.filter(i =>
    (i.full_name||'').toLowerCase().includes(q) ||
    (i.mentor_name||'').toLowerCase().includes(q) ||
    (i.posting_location||'').toLowerCase().includes(q) ||
    (i.college||'').toLowerCase().includes(q)
  );

  const container = document.getElementById('intern-list-home');
  if (!list.length) {
    container.innerHTML = `<div class="empty"><div class="empty-icon">🎓</div><div class="empty-text">No interns found</div></div>`;
    return;
  }
  container.innerHTML = list.map(i => internCardHTML(i)).join('');
}

function internCardHTML(i) {
  const c = checklist[i.id] || {};
  const prog = internProgress(i.id);
  const pct = Math.round((prog / 5) * 100);
  const checks = [
    { key: 'profile', label: 'Intern Profile' },
    { key: 'mentor', label: 'Mentor Profile' },
    { key: 'attendance', label: 'Attendance' },
    { key: 'report', label: 'Report' },
    { key: 'certificate', label: 'Certificate' },
  ];
  const checkHTML = checks.map(ch =>
    `<div class="check-item">
      <div class="check-icon ${c[ch.key] ? 'done' : 'pending'}">${c[ch.key] ? '✓' : '○'}</div>
      <span class="check-label">${ch.label}</span>
    </div>`
  ).join('');

  return `<div class="intern-card" onclick="openDetail('${i.id}')">
    <div class="intern-card-left">
      <div class="intern-name">${i.full_name}</div>
      <div class="intern-meta">${i.college||'—'} · ${i.academic_year||''}</div>
      <span class="intern-badge">${i.posting_location||'No posting'}</span>
      <div class="intern-mentor">${i.mentor_name ? '👤 '+i.mentor_name : 'No mentor assigned'}</div>
      <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
      <div style="font-size:0.65rem;color:var(--muted);margin-top:4px;">${prog}/5 complete</div>
    </div>
    <div class="intern-card-right">${checkHTML}</div>
  </div>`;
}

// ── DETAIL VIEW ───────────────────────────────────────────
async function openDetail(id) {
  const intern = allInterns.find(i => i.id === id);
  if (!intern) return;
  showScreen('detail');

  const c = checklist[id] || {};
  const prog = internProgress(id);
  const pct = Math.round((prog / 5) * 100);

  const checks = [
    { key: 'profile', label: 'Intern Profile', sub: intern.college ? intern.college : 'Fill profile details', action: 'profile' },
    { key: 'mentor', label: 'Mentor Profile', sub: intern.mentor_name || 'No mentor assigned', action: 'mentor' },
    { key: 'attendance', label: 'Attendance Verification', sub: c.attendance ? 'Attendance recorded' : 'Mark attendance', action: 'attendance' },
    { key: 'report', label: 'Report Submission', sub: c.report ? 'Report submitted' : 'No report yet', action: 'report' },
    { key: 'certificate', label: 'Certificate Issued', sub: c.certificate ? 'Certificate issued ✓' : 'Pending', action: 'certificate' },
  ];

  const checkRows = checks.map(ch => `
    <div class="check-row">
      <div class="check-row-left">
        <div class="big-check ${c[ch.key] ? 'done' : 'pending'}">${c[ch.key] ? '✓' : '○'}</div>
        <div>
          <div class="check-row-label">${ch.label}</div>
          <div class="check-row-sub">${ch.sub}</div>
        </div>
      </div>
      ${ch.action !== 'profile' && ch.action !== 'mentor' ? `
        <button class="toggle-btn ${c[ch.key] ? 'unmark' : 'mark'}" onclick="event.stopPropagation();toggleCheck('${id}','${ch.action}',${c[ch.key]})">
          ${c[ch.key] ? 'Unmark' : 'Mark ✓'}
        </button>` : ''}
    </div>`).join('');

  document.getElementById('detail-content').innerHTML = `
    <button onclick="showScreen('home')" style="color:var(--teal);font-size:0.85rem;background:none;border:none;cursor:pointer;margin-bottom:12px;">← Back</button>
    <div class="detail-header">
      <div class="detail-name">${intern.full_name}</div>
      <div class="detail-sub">${intern.college||''} · ${intern.academic_year||''}</div>
      <div style="margin-top:8px;font-size:0.78rem;opacity:0.85;">${intern.department||''} | ${intern.posting_location||''}</div>
      <div style="margin-top:4px;font-size:0.78rem;opacity:0.85;">📅 ${intern.posting_start||'?'} → ${intern.posting_end||'?'}</div>
      <div style="height:6px;background:rgba(255,255,255,0.2);border-radius:3px;margin-top:12px;">
        <div style="height:100%;border-radius:3px;background:#fff;width:${pct}%;transition:width 0.5s;"></div>
      </div>
      <div style="font-size:0.7rem;margin-top:4px;opacity:0.8;">${prog}/5 milestones complete</div>
    </div>

    <div class="detail-checklist">${checkRows}</div>

    <div class="card card-sm" style="margin-bottom:12px;">
      <div style="font-size:0.7rem;color:var(--muted);text-transform:uppercase;letter-spacing:0.05em;margin-bottom:6px;">Mentor</div>
      <div style="font-weight:600;">${intern.mentor_name||'—'}</div>
      <div style="font-size:0.8rem;color:var(--muted);">${intern.mentor_designation||''}</div>
    </div>

    ${intern.objective ? `<div class="card card-sm" style="margin-bottom:12px;">
      <div style="font-size:0.7rem;color:var(--muted);text-transform:uppercase;letter-spacing:0.05em;margin-bottom:6px;">Objective</div>
      <div style="font-size:0.85rem;line-height:1.6;">${intern.objective}</div>
    </div>` : ''}

    <div style="display:flex;gap:10px;">
      <button class="btn btn-secondary" onclick="editIntern('${id}')">✏️ Edit</button>
      <button class="btn btn-danger" onclick="deleteIntern('${id}')">🗑 Delete</button>
    </div>
  `;
}

async function toggleCheck(internId, action, currentState) {
  const table = { attendance: 'attendance', report: 'reports', certificate: 'certificates' }[action];
  if (!table) return;
  if (currentState) {
    await db.from(table).delete().eq('intern_id', internId);
  } else {
    const row = { intern_id: internId };
    if (action === 'attendance') { row.date = new Date().toISOString().split('T')[0]; row.present = true; }
    if (action === 'report') { row.title = 'Internship Report'; row.submitted_at = new Date().toISOString(); }
    if (action === 'certificate') { row.issued_at = new Date().toISOString(); }
    await db.from(table).insert(row);
  }
  await loadChecklist();
  updateStats();
  filterHomeList();
  openDetail(internId);
  showToast(currentState ? 'Unmarked' : 'Marked ✓', 'success');
}

// ── ADD INTERN ────────────────────────────────────────────
async function submitIntern() {
  const name = document.getElementById('f-name').value.trim();
  const college = document.getElementById('f-college').value.trim();
  const location = document.getElementById('f-location').value;
  const mentor = document.getElementById('f-mentor').value.trim();
  if (!name || !college || !location || !mentor) {
    showToast('Please fill required fields (*)', 'error'); return;
  }
  const payload = {
    full_name: name, college,
    department: document.getElementById('f-dept').value.trim(),
    academic_year: document.getElementById('f-year').value.trim(),
    posting_location: location,
    posting_start: document.getElementById('f-start').value || null,
    posting_end: document.getElementById('f-end').value || null,
    mentor_name: mentor,
    mentor_designation: document.getElementById('f-mdesig').value.trim(),
    objective: document.getElementById('f-objective').value.trim(),
  };
  const { error } = await db.from('interns').insert(payload);
  if (error) { showToast('Error: ' + error.message, 'error'); return; }
  showToast('Intern registered!', 'success');
  clearForm();
  await refreshAll();
  showScreen('home');
}

function clearForm() {
  ['f-name','f-college','f-dept','f-year','f-start','f-end','f-mentor','f-mdesig','f-objective'].forEach(id => {
    document.getElementById(id).value = '';
  });
  document.getElementById('f-location').value = '';
}

// ── EDIT / DELETE ─────────────────────────────────────────
function editIntern(id) {
  const i = allInterns.find(x => x.id === id);
  if (!i) return;
  showScreen('add');
  document.getElementById('f-name').value = i.full_name||'';
  document.getElementById('f-college').value = i.college||'';
  document.getElementById('f-dept').value = i.department||'';
  document.getElementById('f-year').value = i.academic_year||'';
  document.getElementById('f-location').value = i.posting_location||'';
  document.getElementById('f-start').value = i.posting_start||'';
  document.getElementById('f-end').value = i.posting_end||'';
  document.getElementById('f-mentor').value = i.mentor_name||'';
  document.getElementById('f-mdesig').value = i.mentor_designation||'';
  document.getElementById('f-objective').value = i.objective||'';
  // Override submit to update
  document.querySelector('#screen-add .btn-primary').textContent = '✦ Update Intern';
  document.querySelector('#screen-add .btn-primary').onclick = async () => {
    const payload = {
      full_name: document.getElementById('f-name').value.trim(),
      college: document.getElementById('f-college').value.trim(),
      department: document.getElementById('f-dept').value.trim(),
      academic_year: document.getElementById('f-year').value.trim(),
      posting_location: document.getElementById('f-location').value,
      posting_start: document.getElementById('f-start').value||null,
      posting_end: document.getElementById('f-end').value||null,
      mentor_name: document.getElementById('f-mentor').value.trim(),
      mentor_designation: document.getElementById('f-mdesig').value.trim(),
      objective: document.getElementById('f-objective').value.trim(),
    };
    await db.from('interns').update(payload).eq('id', id);
    showToast('Updated!', 'success');
    clearForm();
    document.querySelector('#screen-add .btn-primary').textContent = '✦ Register Intern';
    document.querySelector('#screen-add .btn-primary').onclick = submitIntern;
    await refreshAll();
    showScreen('home');
  };
}

async function deleteIntern(id) {
  if (!confirm('Delete this intern record?')) return;
  await db.from('interns').delete().eq('id', id);
  showToast('Deleted', 'success');
  await refreshAll();
  showScreen('home');
}

// ── MENTORS ───────────────────────────────────────────────
function renderMentors() {
  const container = document.getElementById('mentor-list');
  if (!allMentors.length) {
    container.innerHTML = `<div class="empty"><div class="empty-icon">👨‍⚕️</div><div class="empty-text">No mentors yet. Add one!</div></div>`;
    return;
  }
  container.innerHTML = allMentors.map(m => {
    const assigned = allInterns.filter(i => (i.mentor_name||'').toLowerCase() === (m.name||'').toLowerCase()).length;
    const initials = m.name.split(' ').map(w=>w[0]).slice(0,2).join('').toUpperCase();
    return `<div class="card card-sm" style="display:flex;align-items:center;gap:14px;">
      <div class="mentor-avatar">${initials}</div>
      <div style="flex:1;">
        <div style="font-weight:600;">${m.name}</div>
        <div style="font-size:0.78rem;color:var(--muted);">${m.designation||''} · ${m.department||''}</div>
        ${m.email ? `<div style="font-size:0.72rem;color:var(--teal);">${m.email}</div>` : ''}
        <div style="font-size:0.7rem;color:var(--muted);margin-top:2px;">${assigned} intern${assigned!==1?'s':''} assigned</div>
      </div>
      <button class="toggle-btn unmark" onclick="deleteMentor('${m.id}')">✕</button>
    </div>`;
  }).join('');
}

function openAddMentorModal() {
  document.getElementById('mentor-modal').classList.add('show');
}
function closeMentorModal() {
  document.getElementById('mentor-modal').classList.remove('show');
}

async function submitMentor() {
  const name = document.getElementById('m-name').value.trim();
  if (!name) { showToast('Name required', 'error'); return; }
  const { error } = await db.from('mentors').insert({
    name,
    designation: document.getElementById('m-desig').value.trim(),
    department: document.getElementById('m-dept').value.trim(),
    email: document.getElementById('m-email').value.trim(),
    phone: document.getElementById('m-phone').value.trim(),
  });
  if (error) { showToast('Error: '+error.message,'error'); return; }
  ['m-name','m-desig','m-dept','m-email','m-phone'].forEach(id => document.getElementById(id).value='');
  closeMentorModal();
  await loadMentors();
  renderMentors();
  showToast('Mentor added!','success');
}

async function deleteMentor(id) {
  if (!confirm('Remove this mentor?')) return;
  await db.from('mentors').delete().eq('id', id);
  await loadMentors();
  renderMentors();
  showToast('Removed','success');
}

// ── NAVIGATION ────────────────────────────────────────────
function showScreen(name) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  document.getElementById('screen-'+name).classList.add('active');
  const navEl = document.getElementById('nav-'+name);
  if (navEl) navEl.classList.add('active');
  window.scrollTo(0,0);
}

// ── TOAST ─────────────────────────────────────────────────
function showToast(msg, type='') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show ' + type;
  setTimeout(() => { t.className = 'toast'; }, 2500);
}

// Close modal on overlay click
document.getElementById('mentor-modal').addEventListener('click', function(e) {
  if (e.target === this) closeMentorModal();
});
</script>
</body>
</html>
